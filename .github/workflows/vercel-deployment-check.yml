name: Vercel Deployment Status Check (Fallback)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'web-admin/**'
      - '.github/workflows/vercel-deployment-check.yml'
  push:
    branches: [main, develop]
    paths:
      - 'web-admin/**'
      - '.github/workflows/vercel-deployment-check.yml'
  workflow_dispatch:

jobs:
  check-deployment:
    name: Check Vercel Deployment Status
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set deployment context
      id: context
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "environment=preview" >> $GITHUB_OUTPUT
          echo "description=Preview deployment for PR #${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
        else
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "description=Production deployment" >> $GITHUB_OUTPUT
        fi

    - name: Set pending status
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: 'pending',
            target_url: 'https://vercel.com',
            description: 'Checking Vercel deployment status...',
            context: 'Vercel Deployment (${{ steps.context.outputs.environment }})'
          });

    - name: Install Vercel CLI
      run: npm install -g vercel@latest

    - name: Configure Vercel CLI
      run: |
        if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
          echo "Warning: VERCEL_TOKEN secret not configured"
          echo "Deployment check will be skipped"
          echo "status=skipped" >> $GITHUB_ENV
        else
          echo "status=ready" >> $GITHUB_ENV
        fi
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    - name: Wait for Vercel deployment
      id: deployment
      if: env.status == 'ready'
      run: |
        export VERCEL_TOKEN="${{ secrets.VERCEL_TOKEN }}"

        chmod +x scripts/check-vercel-deployment.sh
        chmod +x scripts/wait-for-vercel-deployment.sh

        if scripts/wait-for-vercel-deployment.sh 300; then
          echo "result=success" >> $GITHUB_OUTPUT

          DEPLOYMENT=$(vercel deployments list --project="scoreboard-admin" --limit=1 --json 2>/dev/null)
          DEPLOYMENT_URL=$(echo "$DEPLOYMENT" | jq -r '.[0].url')
          echo "url=https://$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        else
          echo "result=failure" >> $GITHUB_OUTPUT
          echo "url=https://vercel.com" >> $GITHUB_OUTPUT
        fi
      env:
        VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      continue-on-error: true

    - name: Set success status
      if: steps.deployment.outputs.result == 'success'
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: 'success',
            target_url: '${{ steps.deployment.outputs.url }}',
            description: '${{ steps.context.outputs.description }} succeeded',
            context: 'Vercel Deployment (${{ steps.context.outputs.environment }})'
          });

    - name: Set failure status
      if: steps.deployment.outputs.result == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: 'failure',
            target_url: '${{ steps.deployment.outputs.url }}',
            description: '${{ steps.context.outputs.description }} failed',
            context: 'Vercel Deployment (${{ steps.context.outputs.environment }})'
          });
          core.setFailed('Vercel deployment failed');

    - name: Set skipped status
      if: env.status == 'skipped'
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.sha,
            state: 'success',
            target_url: 'https://github.com/${{ github.repository }}/settings/secrets/actions',
            description: 'Vercel check skipped (VERCEL_TOKEN not configured)',
            context: 'Vercel Deployment (${{ steps.context.outputs.environment }})'
          });
