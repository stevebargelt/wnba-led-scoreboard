name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - development
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (default: development)'
        required: false
        default: 'development'
      skip_tests:
        description: 'Skip test suite (not recommended)'
        required: false
        type: boolean
        default: false

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch || 'development' }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Python unit tests
      run: python -m unittest discover

    - name: Check for syntax errors
      run: python -m py_compile app.py

  deploy:
    name: Deploy to Pi
    runs-on: ubuntu-latest
    needs: test
    if: always() && (needs.test.result == 'success' || inputs.skip_tests)
    environment:
      name: raspberry-pi-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch || 'development' }}

    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
        tags: tag:ci

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/pi_deploy_key
        chmod 600 ~/.ssh/pi_deploy_key
        ssh-keyscan -H "${{ secrets.PI_TAILSCALE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Test SSH connection
      run: |
        ssh -i ~/.ssh/pi_deploy_key \
          -o StrictHostKeyChecking=no \
          -o ConnectTimeout=10 \
          ${{ secrets.PI_SSH_USER }}@${{ secrets.PI_TAILSCALE_HOST }} \
          "echo 'SSH connection successful'"

    - name: Deploy to Raspberry Pi
      id: deploy
      run: |
        ssh -i ~/.ssh/pi_deploy_key \
          -o StrictHostKeyChecking=no \
          ${{ secrets.PI_SSH_USER }}@${{ secrets.PI_TAILSCALE_HOST }} \
          "bash -s" < ./scripts/deploy/deploy.sh

    - name: Report deployment status
      if: always()
      run: |
        if [ "${{ steps.deploy.outcome }}" = "success" ]; then
          echo "✅ Deployment successful!"
          echo "Branch: ${{ inputs.branch || 'development' }}"
          echo "Commit: ${{ github.sha }}"
          exit 0
        else
          echo "❌ Deployment failed!"
          echo "Check logs above for details"
          exit 1
        fi

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    environment:
      name: raspberry-pi-test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Connect to Tailscale
      uses: tailscale/github-action@v2
      with:
        oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
        tags: tag:ci

    - name: Set up SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.PI_SSH_KEY }}" > ~/.ssh/pi_deploy_key
        chmod 600 ~/.ssh/pi_deploy_key
        ssh-keyscan -H "${{ secrets.PI_TAILSCALE_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Execute rollback
      run: |
        echo "⚠️ Deployment failed, initiating rollback..."
        ssh -i ~/.ssh/pi_deploy_key \
          -o StrictHostKeyChecking=no \
          ${{ secrets.PI_SSH_USER }}@${{ secrets.PI_TAILSCALE_HOST }} \
          "/home/pi/wnba-led-scoreboard/scripts/deploy/rollback.sh"

    - name: Report rollback status
      if: always()
      run: |
        echo "🔄 Rollback completed"
        echo "Check Pi logs for current service status"
